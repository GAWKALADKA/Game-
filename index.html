<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Game Championship</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Poppins&display=swap');

body{
margin:0;
font-family:Poppins,sans-serif;
background:#050505;
color:#fff;
text-align:center;
}

header{
padding:25px;
}

.logo{
font-family:Orbitron;
font-size:2.2rem;
background:linear-gradient(90deg,#00ffff,#ff00ff,#00ffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 3s linear infinite;
}

@keyframes move{to{background-position:200%}}

.container{
max-width:650px;
margin:auto;
padding:20px;
}

.card{
background:#111;
border:2px solid #00ffff;
border-radius:20px;
padding:25px;
margin-bottom:25px;
box-shadow:0 0 20px #00ffff33;
}

h2{
font-family:Orbitron;
color:#00ffff;
}

.timer{
font-size:1.3rem;
margin-top:10px;
color:#ff00ff;
font-weight:bold;
}

.rule{
background:#000;
padding:10px;
border-left:4px solid #ff00ff;
margin:8px 0;
text-align:left;
}

input,select{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:2px solid #333;
background:#000;
color:#fff;
}

button{
padding:15px 25px;
border:none;
border-radius:30px;
font-family:Orbitron;
font-size:1rem;
cursor:pointer;
background:linear-gradient(90deg,#00ffff,#00ff88);
color:#000;
margin-top:10px;
}

button:hover{transform:scale(1.05)}

.whatsapp{
background:#25D366;
color:#000;
margin-top:15px;
}

footer{
color:#777;
font-size:.8rem;
margin:25px;
}
</style>
</head>

<body>

<header>
<div class="logo">🎮 GAME CHAMPIONSHIP</div>
<p>Show Your Skills • Win Cash</p>
</header>

<div class="container">

<!-- TIMER -->
<div class="card">
<h2>⏳ Tournament Ends In</h2>
<div class="timer" id="countdown">Loading...</div>
</div>

<!-- PRIZE -->
<div class="card">
<h2>🏆 Winning Prize</h2>
<h1 style="color:#00ff88;">₹100 CASH</h1>
</div>

<!-- RULES -->
<div class="card">
<h2>📜 Rules</h2>
<div class="rule">✅ Entry FREE</div>
<div class="rule">❌ Fake entry = Disqualified</div>
<div class="rule">📱 WhatsApp group join mandatory</div>
<div class="rule">⚖️ Admin decision final</div>
</div>

<!-- FORM -->
<div class="card">
<h2>⚡ Player Registration</h2>

<form id="form">
<input type="text" id="name" placeholder="Player Name" required>
<select id="game" required>
<option value="">Select Game</option>
<option>BGMI</option>
<option>Free Fire</option>
<option>COC</option>
<option>Valorant</option>
</select>
<input type="tel" id="number" placeholder="WhatsApp Number" required>
<button type="submit">🚀 Register Now</button>
</form>

<a href="https://chat.whatsapp.com/DJJbEl6PvNe0uTppgPJBax?mode=gi_t" target="_blank">
<button class="whatsapp">💬 Join WhatsApp Group</button>
</a>

</div>

</div>

<footer>
Made with ❤️ | Game Championship
</footer>

<script>
// TIMER
const end = new Date();
end.setDate(end.getDate()+4);
end.setHours(end.getHours()+2);
end.setMinutes(end.getMinutes()+25);

setInterval(()=>{
const now=new Date();
const diff=end-now;
if(diff<=0){document.getElementById("countdown").innerText="Registration Closed";return;}
const d=Math.floor(diff/86400000);
const h=Math.floor(diff%86400000/3600000);
const m=Math.floor(diff%3600000/60000);
document.getElementById("countdown").innerText=`${d} Days ${h} Hours ${m} Minutes`;
},1000);

// FORM SUBMIT
document.getElementById("form").addEventListener("submit",e=>{
e.preventDefault();
const name=document.getElementById("name").value;
const game=document.getElementById("game").value;
const num=document.getElementById("number").value;

const msg=`🎮 NEW REGISTRATION\nName: ${name}\nGame: ${game}\nWhatsApp: ${num}`;
window.open(`https://wa.me/917520917031?text=${encodeURIComponent(msg)}`,"_blank");
alert("✅ Registration Successful!\nJoin WhatsApp group now");
e.target.reset();
});
</script>

</body>
</html>
